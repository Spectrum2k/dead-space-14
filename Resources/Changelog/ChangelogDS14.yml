- id: 41
  author: TheZuTi
  time: '2026-05-05T18:35:40.649583+00:00'
  pr: 1295
  changes:
  - type: Add
    message: Заратана из Mewgenics может появиться в игре с шансом как у дракона.
      Заратана является свободным агентом, то есть Заратана может так и помогать станции
      и жить на ней спокойно, так и убивать всех. Способности Заратаны заключаются
      в умении показать себя в микро контроле. Первая способность Заратаны это спавн
      слабого полу метеорита, полу камня, что имеет неплохой урон, очень большой урон
      по структурке, и большой стак огня, камень же этот можно запульнуть куда нужно
      с помощью мини телепатии, телепатия не совсем абилка, скорее инструмент, вы
      можете отправить в полёт только 3 камня рядом, однако помимо камней, если вам
      очень сильно повезёт, вы можете перехватит малый метеорит. Вторая способность
      же это превратиться в крутящийся камень, который наносит урон по тому, куда
      случился толчок, контролировать себя во время формы камня нельзя, но вы бьётесь
      по углам как DVD логотип в течении несколько секунд, любая вещь что в вас попала
      во время этой формы, будто пули, летят обратно, а также меняя траекторию кручение,
      с помощью этой спобности можно отбивать свои камни, туда куда нужно. Третья
      спобность это плевок слабыми камнями по кругу в количестве 8 штук, эти же камни
      можно перехватить телекинезом. Пасивка Заратаны заключается в том, что если
      она получит 25 урона, эффект который копиться, то заратана выпускает 3 слабых
      камня по сторонам.
